<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalender Pendidikan Dinamis</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/print.css" media="print" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <h1>Kalender Pendidikan</h1>
        <p class="subtitle">Susun & cetak per semester</p>
      </header>

      <nav class="tabs">
        <button type="button" class="tab active" data-tab="sekolah">Sekolah</button>
        <button type="button" class="tab" data-tab="semester">Semester</button>
        <button type="button" class="tab" data-tab="keterangan">Keterangan</button>
        <button type="button" class="tab" data-tab="cetak">Cetak</button>
      </nav>

      <div class="tab-panels">
        <section class="panel active" data-panel="sekolah">
          <label>Nama sekolah <input id="schoolName" type="text" /></label>
          <label>Tahun ajaran <input id="tahunAjaran" type="text" /></label>
          <label>Kepala sekolah <input id="kepalaSekolah" type="text" /></label>
          <label>NIP <input id="nipKepala" type="text" /></label>
          <label>Tempat, tanggal TTD <input id="ttdTempat" type="text" /></label>
        </section>

        <section class="panel" data-panel="semester">
          <h3>Semester 1</h3>
          <label>Mulai <input type="date" id="s1Start" /></label>
          <label>Selesai <input type="date" id="s1End" /></label>
          <h3>Semester 2</h3>
          <label>Mulai <input type="date" id="s2Start" /></label>
          <label>Selesai <input type="date" id="s2End" /></label>
          <p class="hint">Satu halaman cetak per semester (maks. 6 bulan).</p>
        </section>

        <section class="panel" data-panel="keterangan">
          <label>Label <input id="markerLabel" type="text" placeholder="Libur Nasional" /></label>
          <label>Warna <input type="color" id="markerColor" value="#e11d48" /></label>
          <label>Simbol <input id="markerIcon" maxlength="2" placeholder="★" /></label>
          <label>Mulai <input type="date" id="markerStart" /></label>
          <label>Akhir <input type="date" id="markerEnd" /></label>
          <label><input type="checkbox" id="markerLibur" checked /> Kurangi hari efektif</label>
          <label>Semester
            <select id="markerSemester">
              <option value="all">Semua</option>
              <option value="1">1</option>
              <option value="2">2</option>
            </select>
          </label>
          <button class="btn primary" id="btnAddMarker" type="button">Tambah</button>
          <ul class="marker-list" id="markerList"></ul>
          <button class="btn ghost" id="btnLoadLiburNasional" type="button">Muat libur nasional</button>
        </section>

        <section class="panel" data-panel="cetak">
          <label>Kertas
            <select id="paperSize">
              <option value="f4">F4 (21,5 × 33 cm)</option>
              <option value="a4">A4</option>
            </select>
          </label>
          <label>Orientasi
            <select id="printOrientation">
              <option value="portrait">Portrait (3+3)</option>
              <option value="landscape">Landscape (6)</option>
            </select>
          </label>
          <fieldset class="margins">
            <legend>Margin (cm)</legend>
            <label>Atas <input type="number" id="marginTop" value="1.5" step="0.1" /></label>
            <label>Kanan <input type="number" id="marginRight" value="1.5" step="0.1" /></label>
            <label>Bawah <input type="number" id="marginBottom" value="1.5" step="0.1" /></label>
            <label>Kiri <input type="number" id="marginLeft" value="1.5" step="0.1" /></label>
          </fieldset>
          <label><input type="checkbox" id="weekendLibur" checked /> Sabtu & Minggu libur</label>
          <button class="btn primary" id="btnPreview" type="button">Perbarui pratinjau</button>
          <button class="btn accent" id="btnPrint" type="button">Cetak</button>
          <button class="btn ghost" id="btnExport" type="button">Ekspor JSON</button>
          <label class="btn ghost">Impor JSON
            <input type="file" id="importFile" accept="application/json" hidden />
          </label>
        </section>
      </div>
    </aside>

    <main class="preview-area">
      <div class="preview-toolbar no-print">
        <span>Pratinjau</span>
        <button type="button" id="toggleSidebar">Panel</button>
      </div>
      <div id="printRoot" class="print-root"></div>
    </main>
  </div>

  <script src="js/holidays-id.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
